<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>FlightMate AI</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 640px; margin: 40px auto; background: #0f172a; color: #e2e8f0; }
  h1 { color: #38bdf8; }
  #chat { border: 1px solid #334155; border-radius: 8px; padding: 16px; height: 420px; overflow-y: auto; margin-bottom: 12px; background: #1e293b; }
  .msg { margin: 8px 0; padding: 8px 12px; border-radius: 8px; max-width: 80%; }
  .user { background: #38bdf8; color: #0f172a; margin-left: auto; }
  .agent { background: #334155; }
  .pending { background: #92400e; font-style: italic; }
  form { display: flex; gap: 8px; }
  input { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; }
  button { padding: 10px 16px; border-radius: 6px; border: none; background: #38bdf8; color: #0f172a; font-weight: bold; cursor: pointer; }
  a { color: #38bdf8; }
</style>
</head>
<body>
  <h1>✈️ FlightMate AI</h1>
  <p>Ask about flights, baggage rules, visas, or travel tips. <a href="/review.html">Reviewer dashboard →</a></p>
  <div id="chat"></div>
  <form id="chatForm">
    <input id="input" placeholder="e.g. What's the best flight to book for Manila?" autocomplete="off" />
    <button type="submit">Send</button>
  </form>

<script>
  const sessionId = localStorage.getItem('sessionId') || crypto.randomUUID();
  localStorage.setItem('sessionId', sessionId);

  const chat = document.getElementById('chat');
  const form = document.getElementById('chatForm');
  const input = document.getElementById('input');

  function addMessage(text, cls) {
    const div = document.createElement('div');
    div.className = 'msg ' + cls;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const message = input.value.trim();
    if (!message) return;
    addMessage(message, 'user');
    input.value = '';

    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, sessionId })
    });
    const data = await res.json();

    if (data.status === 'pending_review') {
      addMessage('⏳ ' + data.message + ' (review ID: ' + data.reviewId + ')', 'pending');
      pollReview(data.reviewId);
    } else {
      addMessage(data.reply, 'agent');
    }
  });

  async function pollReview(reviewId) {
    const interval = setInterval(async () => {
      const res = await fetch('/reviews/' + reviewId);
      const review = await res.json();
      if (review.status !== 'pending') {
        clearInterval(interval);
        if (review.status === 'approved') {
          addMessage('✅ Approved: ' + review.agent_output, 'agent');
        } else if (review.status === 'modified') {
          addMessage('✏️ Approved (modified): ' + review.modified_content, 'agent');
        } else {
          addMessage('❌ This recommendation was rejected by a reviewer.', 'agent');
        }
      }
    }, 3000);
  }
</script>
<script>
  var vapiInstance = null;
  const assistant = "4ef6b456-5edb-4445-b3f3-cd7ea8850fba"; // Substitute with your assistant ID
  const apiKey = "3cb1ce9c-172b-42b0-bdee-451635216d51"; // Substitute with your Public key from Vapi Dashboard.
  const buttonConfig = {}; // Modify this as required

  (function (d, t) {
    var g = document.createElement(t),
      s = d.getElementsByTagName(t)[0];
    g.src =
      "https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
    g.defer = true;
    g.async = true;
    s.parentNode.insertBefore(g, s);

    g.onload = function () {
      vapiInstance = window.vapiSDK.run({
        apiKey: apiKey, // mandatory
        assistant: assistant, // mandatory
        config: buttonConfig, // optional
      });
    };
  })(document, "script");
</script>

</body>
</html>
